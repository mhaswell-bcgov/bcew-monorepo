name: Bug report
description: Report a problem or regression in the monorepo, plugin, theme, or shared package.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this issue. Please provide enough detail for maintainers to reproduce and triage it quickly.
  - type: input
    id: project
    attributes:
      label: Affected project or area
      description: Name the plugin, theme, package, or path affected.
      placeholder: e.g. plugins/bcew-blocks or packages/e2e
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is the problem?
      placeholder: Briefly describe the bug in one or two sentences.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: Describe the intended behavior.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
      placeholder: Include any error messages, screenshots, or logs if relevant.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the steps required to reproduce the issue.
      placeholder: |
        1. Go to...
        2. Click...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include browser, OS, Node/Pnpm, or other relevant context.
      placeholder: e.g. macOS 14, Node 20, pnpm 9
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other details that may help.
      placeholder: Relevant links, screenshots, or notes.
