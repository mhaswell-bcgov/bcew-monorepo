# https://github.com/actions/labeler
monorepo:
    - changed-files:
          - all-globs-to-any-file:
                - '**'
                - '!plugins/**'
                - '!themes/**'

plugin:
    - changed-files:
          - any-glob-to-any-file: 'plugins/**'

theme:
    - changed-files:
          - any-glob-to-any-file: 'themes/**'

themes/child-theme-belleville-terminal:
    - changed-files:
          - any-glob-to-any-file: 'themes/design-system-wordpress-child-theme-belleville-terminal/**'

plugins/bcew-blocks:
    - changed-files:
          - any-glob-to-any-file: 'plugins/bcew-blocks/**'

themes/child-theme-ticorp:
    - changed-files:
          - any-glob-to-any-file: 'themes/design-system-wordpress-child-theme-ticorp/**'

themes/bcew-theme-2:
    - changed-files:
          - any-glob-to-any-file: 'themes/bcew-theme-2/**'
