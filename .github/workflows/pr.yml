name: Pull request checks

on:
    pull_request:

# Avoid duplicate runs on force-pushes
concurrency:
    group: pr-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    labeler:
        name: Add labels
        permissions:
            contents: read
            pull-requests: write
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/labeler@v6
              with:
                  sync-labels: true

    lint:
        name: Lint monorepo
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.head_ref }}

            - name: Setup Node.js 24
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10
                  run_install: true
                  cache: true

            - name: Install Composer dependencies
              run: composer i

            - name: Run php lint
              run: pnpm run lint-php

            - name: Run js lint
              run: pnpm run lint-js

            - name: Run css lint
              run: pnpm run lint-css

            - name: Run md lint
              run: pnpm run lint-md

            - name: Run package.json lint
              run: pnpm run lint-pkg-json
    
    test-integration:
        name: Test integration (affected)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ github.head_ref }}

            - name: Setup Node.js 24
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10
                  run_install: true
                  cache: true

            - name: Install Composer dependencies
              run: composer i

            - name: Run PHP integration tests
              run: npx nx affected --base="origin/${{ github.base_ref }}" -t test-integration

    test-e2e:
        name: Test e2e (affected)
        runs-on: ubuntu-latest
        container:
            image: mcr.microsoft.com/playwright:v1.58.2-noble
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js 24
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10
                  run_install: true
                  cache: true

            - name: Setup PHP with Composer
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '7.4'
                  tools: composer

            - name: Install Composer dependencies
              run: composer i

            - name: Run e2e tests
              run: npx nx affected --base="${{ github.base_ref }}" -t test-e2e

            - uses: actions/upload-artifact@v4
              if: ${{ !cancelled() }}
              with:
                  name: playwright-e2e-report
                  path: |
                    plugins/*/artifacts/test-results/
                    themes/*/artifacts/test-results/
                  retention-days: 7

    test-screenshot:
        name: Test screenshots (affected)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js 24
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10
                  run_install: true
                  cache: true

            - name: Install Composer dependencies
              run: composer i

            - name: Cache pnpm store
              uses: actions/cache@v4
              with:
                  path: .pnpm-store
                  key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: pnpm-store-

            - name: Run screenshot tests
              run: npx nx affected --base="${{ github.base_ref }}" -t test-screenshot

            - uses: actions/upload-artifact@v4
              if: ${{ !cancelled() }}
              with:
                  name: playwright-screenshot-report
                  path: |
                    plugins/*/artifacts/test-results/
                    themes/*/artifacts/test-results/
                  retention-days: 7
