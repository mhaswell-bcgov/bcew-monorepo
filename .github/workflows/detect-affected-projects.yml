name: Detect affected projects

on:
    workflow_call:
        outputs:
            projects:
                description: "List of affected application projects"
                value: ${{ jobs.detect-affected-projects.outputs.projects }}

permissions:
    contents: read

jobs:
    detect-affected-projects:
        name: Detect affected sub-projects
        runs-on: ubuntu-latest
        outputs:
            projects: ${{ steps.compute.outputs.projects }}
        steps:
            - name: Checkout
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Install pnpm
              uses: pnpm/action-setup@v6.0.9
              with:
                  version: 10
                  cache: true
            
            - name: Setup Node.js 24
              uses: actions/setup-node@v6.4.0
              with:
                  node-version: 24
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install

            - name: Get affected projects
              id: compute
              shell: bash
              run: |
                # Determine correct base/head for PRs
                if [[ "${{ github.event_name }}" == "pull_request" ]]; then
                    git fetch origin "${{ github.base_ref }}:origin/${{ github.base_ref }}"
                    BASE="origin/${{ github.base_ref }}"
                    HEAD="${{ github.sha }}"
                else
                    BASE="origin/${{ github.event.repository.default_branch }}"
                    HEAD="${{ github.sha }}"
                fi

                PROJECTS=$(npx nx show projects --base=$BASE --head=$HEAD --type app --affected --json)
                echo "projects=$PROJECTS" >> "$GITHUB_OUTPUT"
                echo "$PROJECTS"
