name: Deploy documentation site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "plugins/**/docs/**"
      - "themes/**/docs/**"
      - "tools/sync-docs.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "plugins/**/docs/**"
      - "themes/**/docs/**"
      - "tools/sync-docs.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-docs.yml"

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6.4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs site (VitePress; includes sync)
        env:
          DOCS_BASE: /bcew-monorepo/docs
        run: pnpm docs:build

      - name: Deploy to gh-pages/docs
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs/.vitepress/dist
          target-folder: docs
          clean: true
