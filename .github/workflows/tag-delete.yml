 >....
          }

          foreach ($data["packages"] as $packageName => &$releases) {
              if (!is_array($releases)) {
                  continue;
              }

              foreach ($releases as $releaseVersion => $release) {
                  if (!is_array($release)) {
                      continue;
                  }

                  $distRef = $release["dist"]["reference"] ?? null;
                  $sourceRef = $release["source"]["reference"] ?? null;

                  if (
                      $distRef === $tag ||
                      $sourceRef === $tag ||
                      (($distRef === null && $sourceRef === null) && $releaseVersion === $version)
                  ) {
                      unset($releases[$releaseVersion]);
                  }
              }

              if (empty($releases)) {
                  unset($data["packages"][$packageName]);
              }
          }
          unset($releases);

          file_put_contents($path, json_encode($data, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES) . "\n");
          '

      - name: Prepare Pages content
        if: ${{ steps.vars.outputs.supported == 'true' }}
        run: |
          mkdir -p public
          cp packages.json public/packages.json

      - name: Deploy to GH Pages
        if: ${{ steps.vars.outputs.supported == 'true' }}
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          publish_dir: ./public
          keep_files: true

